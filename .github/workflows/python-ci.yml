name: Python CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 檢索程式碼 (Checkout code)
      uses: actions/checkout@v4

    - name: 設置 Python 環境 (Set up Python)
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # 開啟 pip 快取以加速後續建置

    - name: 安裝依賴套件 (Install dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 進行基礎語法檢查 (Lint with flake8)
      run: |
        # 檢查是否有嚴重的語法錯誤 (Syntax errors or undefined names)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # 顯示一般提示但不會讓 CI 失敗 (exit-zero)
        flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics
